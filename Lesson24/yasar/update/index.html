<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update User</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div class="form-wrapper">
    <div class="form-container">
      <div class="container status-alert hidden" id="statusContainer" role="status" aria-live="polite">
    <p id="status"></p>
    <button class="close-btn" id="closeStatusButton" aria-label="Close message">X</button>
</div>
      <form id="updateForm">
        <div class="form-group">
          <label for="firstName">First name:</label>
          <input type="text" id="firstName" name="firstName" placeholder="firstname" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last name:</label>
          <input type="text" id="lastName" name="lastName" placeholder="lastname" required>
        </div>
        <div class="form-group">
          <label for="age">Age:</label>
          <input type="number" id="age" min="1" name="age" placeholder="age" required>
        </div>
        <button type="submit" class="button button--success">Update</button>
      </form>
    </div>
  </div>

  <script src="../update/update.js"></script>
</body>
</html>
