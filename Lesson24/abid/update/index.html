<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update User</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <h1>Update User</h1>
  
  <div class="container hidden" id="statusContainer">
    <p id="status"></p>
    <button id="closeStatus" class="button button--danger">X</button>
  </div>

  <div class="container">
    <form id="updateUserForm">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input 
        type="text" 
        id="firstName" 
        name="firstName" 
        placeholder="First Name"
        required>
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input 
        type="text" 
        id="lastName" 
        name="lastName" 
        placeholder="Last Name"
        required>
      </div>
      <div class="form-group">
        <label for="age">Age</label>
        <input 
        type="number" 
        id="age" 
        name="age" 
        placeholder="Age"
        required 
        min="1">
      </div>
      <div class="ctas">
        <button type="submit" class="button button--success">Update User</button>
        <a class="button" href="../index.html">Cancel</a>
      </div>
    </form>
  </div>

  <script src="../script.js"></script>
</body>
</html>
