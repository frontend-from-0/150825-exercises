<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update User</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header>
    <h1>Update User</h1>
  </header>
  
  <main>
    <div class="container status-message-container hidden" id="statusContainer">
      <p class="status-message-text" id="status"></p>
      <button id="closeStatus" class="button button--danger">X</button>
    </div>

    <div class="container">
      <form id="updateUserForm" class="user-form">
        <div class="form-group">
          <label class="form-label" for="firstName">First Name</label>
          <input class="form-input" type="text" id="firstName" name="firstName" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="lastName">Last Name</label>
          <input class="form-input" type="text" id="lastName" name="lastName" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="age">Age</label>
          <input class="form-input" type="number" id="age" name="age" required min="1">
        </div>
        <div class="ctas">
          <button type="submit" class="button button--success">Update User</button>
          <a class="button" href="../index.html">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <script src="update.js"></script>
</body>
</html>
