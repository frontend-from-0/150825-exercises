<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="container">
        <h1>Add New User</h1>
        <form id="createForm">
            <input type="text" id="fName" placeholder="First Name" required class="card" style="width:100%">
            <input type="text" id="lName" placeholder="Last Name" required class="card" style="width:100%">
            <input type="number" id="age" placeholder="Age" required class="card" style="width:100%">
            <button type="submit" class="button button--success">Save User</button>
            <a href="../index.html" class="button">Cancel</a>
        </form>
    </div>

    <script>
        document.getElementById('createForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const userData = {
                firstName: document.getElementById('fName').value,
                lastName: document.getElementById('lName').value,
                age: document.getElementById('age').value
            };

            fetch('https://dummyjson.com/users/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            })
            .then(res => res.json())
            .then(data => {
                alert("User created with ID: " + data.id);
                window.location.href = "../index.html";
            });
        });
    </script>
</body>
</html>
