<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointment Booking</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <main>
      <div class="container">
        <header>
          <h1>Book an Appointment</h1>
        </header>

        <form class="booking">
          <div class="input-area">
            <section class="form-label">
              <label for="name">Full Name</label>
              <input
                type="text"
                id="name"
                name="full_Name"
                placeholder="John Doe"
                class="form-input"
                required
              />

              <label for="email">E-Mail</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="john@gmail.com"
                class="form-input"
                required
              />
            </section>
            <section class="calendar form-label">
              <label for="date">Select a date</label>
              <input type="date" id="date" class="form-input" required />
              <h2 id="timeslots-heading">Available Time Slots</h2>
              <fieldset class="timeslots" aria-labelledby="timeslots-heading">
                <legend class="hidden">Choose a time slot</legend>
                <button
                  class="slot"
                  type="button"
                  aria-label="Select 09:00 time slot"
                >
                  09:00
                </button>
                <button
                  class="slot"
                  type="button"
                  aria-label="Select 10:30 time slot"
                >
                  10:30
                </button>
                <button
                  class="slot"
                  type="button"
                  aria-label="Select 13:00 time slot"
                >
                  13:00
                </button>
                <button
                  class="slot"
                  type="button"
                  aria-label="Select 14:30 time slot"
                >
                  14:30
                </button>
                <button
                  class="slot"
                  type="button"
                  aria-label="Select 16:00 time slot"
                >
                  16:00
                </button>
              </fieldset>
            </section>
          </div>

          <aside class="summary">
            <h2>Your Appointment</h2>
            <p>Name: <span id="entered-name">-</span></p>
            <p>Email: <span id="entered-email">-</span></p>
            <p>Date: <span id="selected-date">-</span></p>
            <p>Time: <span id="selected-time">-</span></p>
            <button class="confirm-btn" id="confirm" disabled type="submit">
              Confirm Booking
            </button>
          </aside>
        </form>

        <div class="hidden confirmation-page" id="confirmation-message">
          <h2>
            Booking is confirmed!

            <button id="back-btn" type="button">
              <i class="fa fa-arrow-circle-left" aria-hidden="true"></i>
            </button>
          </h2>

          <div>
            <h3 class="detail-heading">Booking Details:</h3>
            <p><b>Name: </b><span id="confirmed-name">-</span></p>
            <p><b>Email: </b><span id="confirmed-email">-</span></p>
            <p><b>Date: </b><span id="confirmed-date">-</span></p>
            <p><b>Time: </b><span id="confirmed-time">-</span></p>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
